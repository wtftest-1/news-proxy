<div id="re-news-widget">
  <div id="re-news-loading" style="text-align:center;padding:40px;color:#888;font-family:inherit;">Chargement des actualités…</div>
  <div id="re-news-error" style="display:none;color:#c00;padding:10px;font-family:inherit;"></div>
  <div id="re-news-container" style="display:none;"></div>
</div>

<style>
#re-news-widget { font-family: inherit; max-width: 1100px; margin: 0 auto; }

/* Filters */
.re-filters { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; }
.re-filter-btn {
  padding:6px 16px; border:1px solid #ddd; border-radius:20px;
  background:#fff; cursor:pointer; font-size:13px; transition:.2s; color:#555;
}
.re-filter-btn:hover { border-color:#1a3c5e; color:#1a3c5e; }
.re-filter-btn.active { background:#1a3c5e; color:#fff; border-color:#1a3c5e; }

/* Featured card */
.re-featured {
  border-radius:12px; overflow:hidden; margin-bottom:24px;
  background:#1a3c5e; color:#fff; padding:36px 40px;
  position:relative; cursor:pointer;
}
.re-featured:hover { background:#15304e; }
.re-featured a { color:#fff; text-decoration:none; }
.re-featured .re-badge {
  display:inline-block; padding:3px 10px; border-radius:12px; font-size:11px;
  font-weight:700; text-transform:uppercase; letter-spacing:.6px;
  background:rgba(255,255,255,.15); color:#fff; margin-bottom:14px;
}
.re-featured .re-title { font-size:22px; font-weight:700; line-height:1.4; margin-bottom:12px; }
.re-featured .re-desc { font-size:14px; line-height:1.6; opacity:.8; margin-bottom:16px; }
.re-featured .re-meta { font-size:12px; opacity:.6; display:flex; gap:16px; }

/* Small cards grid */
.re-grid {
  display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:16px;
}
.re-card {
  border:1px solid #e8e8e8; border-radius:10px; padding:18px;
  background:#fff; display:flex; flex-direction:column; gap:8px;
  transition:box-shadow .2s; cursor:pointer;
}
.re-card:hover { box-shadow:0 4px 16px rgba(0,0,0,.08); border-color:#ccc; }
.re-card a { color:inherit; text-decoration:none; }
.re-badge {
  display:inline-block; padding:2px 8px; border-radius:10px;
  font-size:10px; font-weight:700; text-transform:uppercase; letter-spacing:.5px; width:fit-content;
}
.re-badge.high   { background:#fde8e8; color:#c0392b; }
.re-badge.medium { background:#fef3e2; color:#d35400; }
.re-badge.low    { background:#e8f5e9; color:#27ae60; }
.re-card .re-title { font-size:13px; font-weight:600; line-height:1.45; color:#1a1a1a; flex:1; }
.re-card .re-meta { font-size:11px; color:#aaa; display:flex; justify-content:space-between; margin-top:4px; }
.re-region { font-size:10px; padding:1px 6px; border-radius:4px; background:#f0f0f0; color:#777; }

.re-empty { text-align:center; color:#aaa; padding:60px 0; font-family:inherit; }
</style>

<script>
(function(){
  var API_URL = 'https://web-production-6c07.up.railway.app/api/news';
  var REGION_LABELS = { belgique:'🇧🇪 Belgique', luxembourg:'🇱🇺 Luxembourg', france:'🇫🇷 France' };
  var currentFilter = 'all';
  var allArticles = [];

  function fmt(str) {
    if (!str) return '';
    var d = new Date(str);
    return isNaN(d) ? '' : d.toLocaleDateString('fr-BE', { day:'numeric', month:'short', year:'numeric' });
  }

  function render(articles) {
    var container = document.getElementById('re-news-container');
    var top10 = articles.slice(0, 10);

    if (!top10.length) {
      container.innerHTML = '<p class="re-empty">Aucune actualité disponible pour le moment.</p>';
      return;
    }

    var featured = top10[0];
    var rest = top10.slice(1);

    var html = '<div class="re-filters">'
      + btn('all', 'Tous')
      + Object.keys(REGION_LABELS).map(function(r){ return btn(r, REGION_LABELS[r]); }).join('')
      + '</div>';

    // Featured
    html += '<div class="re-featured">'
      + '<span class="re-badge">' + featured._impact + ' · ' + (REGION_LABELS[featured._region] || featured._region) + '</span>'
      + '<div class="re-title"><a href="' + featured.link + '" target="_blank" rel="noopener">' + featured.title + '</a></div>'
      + (featured.description ? '<div class="re-desc">' + featured.description.slice(0, 200) + '…</div>' : '')
      + '<div class="re-meta"><span>' + fmt(featured.pubDate) + '</span><span>' + featured._source + '</span></div>'
      + '</div>';

    // Grid of remaining 9
    if (rest.length) {
      html += '<div class="re-grid">'
        + rest.map(function(a){
            return '<div class="re-card">'
              + '<span class="re-badge ' + a._impact + '">' + a._impact + '</span>'
              + '<div class="re-title"><a href="' + a.link + '" target="_blank" rel="noopener">' + a.title + '</a></div>'
              + '<div class="re-meta"><span>' + fmt(a.pubDate) + '</span><span class="re-region">' + (REGION_LABELS[a._region] || a._region) + '</span></div>'
              + '</div>';
          }).join('')
        + '</div>';
    }

    container.innerHTML = html;

    // Re-attach filter button events
    container.querySelectorAll('.re-filter-btn').forEach(function(b){
      b.addEventListener('click', function(){ filter(b.dataset.region); });
    });
  }

  function btn(region, label) {
    var active = currentFilter === region ? ' active' : '';
    return '<button class="re-filter-btn' + active + '" data-region="' + region + '">' + label + '</button>';
  }

  function filter(region) {
    currentFilter = region;
    var filtered = region === 'all' ? allArticles : allArticles.filter(function(a){ return a._region === region; });
    render(filtered);
  }

  var loading   = document.getElementById('re-news-loading');
  var errorEl   = document.getElementById('re-news-error');
  var container = document.getElementById('re-news-container');

  fetch(API_URL)
    .then(function(r){ if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(function(data){
      allArticles = data.articles || [];
      loading.style.display   = 'none';
      container.style.display = 'block';
      render(allArticles);
    })
    .catch(function(err){
      loading.style.display  = 'none';
      errorEl.style.display  = 'block';
      errorEl.textContent    = 'Erreur lors du chargement des actualités. (' + err.message + ')';
    });
})();
</script>
